front:
  text: 感氣十六轉金丹蘭四母一十六兩鑿成一十六塊如法鎚打令實無鋒芒桑柴不拘多少日乾燒灰一斗許做灰蘿用百沸湯淋汁一斗許盛於淨器中骨碎補去葉皮淨一名土猴薑千年潤一名地蜈蚣洗去土去水脈和葉並根稱二味草各稱二斤入石臼爛搗用新布裂汁乾再搗凡八九次搗取汁一斗許如未至一斗但以前灰汁揉搗盛淨器中
  hash: sha256:5bb79fe824bc7dc1e42fb98cc07b518bfab941c3e9c2e874ed6cffde0c49d691
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0309_HFL_000-001a, image: hfl/0591/0591-004.png}
body:
  text: 右用砂銚一枚可盛三升水者將砂銚安鐵三腳子上傾灰汁藥汁於銚內只令六七分滿將前母用小竹𥰭兒盛懸胎於砂銚內炭火上煮汁常沸莫令涌出頻於灰藥汁浸點煮如是點煮一伏時如灰藥汁少更要將前灰蘿煮沸湯淋汁和藥查再搗添煮一伏時為度如是煮畢取𥰭兒取出母逐塊以淨布拭去水滓令乾入砂合子須是信州頭樣大合子則可將前所煮母一十六塊排砂合底合定以醋調蚌粉封合子口縫如闕蚌粉用赤石脂尤佳虛養一伏時卯酉各火四兩次日開合則澆汞四兩於母上如前法封固下用水鼎坐合子於水鼎上具式如後爐用上做或以瓦燒成器通身要高二尺二寸徑一尺二寸上兩竅如折二錢大下三竅如小銅錢大水鼎乃磁器可貯水三升者要鼎口與合子底一般大每用水鼎入沸惕六七分滿爐中所用灰乃用紙錢灰依式造畢養火如法其火四兩要三塊頓合子頂上候通紅不滅以灰覆之卯酉抽换七日火足寒爐出合開看其汞成魚鬛色如霜四兩再燒汞四兩如前封固如前入爐添水如前封水鼎口如前卯酉各火四兩養七日去火寒爐開看其汞乾如玉犬牙八兩再澆汞四兩併如前法七日火足開看其汞乾如馬齒琅玕一拾二兩再澆汞四兩併如前法養七日火足開看其汞乾如瓊林玉樹一十六兩再澆汞四兩併如前法養七日火足開看其汞乾成黃芽共二十兩更添水鼎湯坐合子上如前封固火數虛養七日取出開合摘黃芽成大丹要留為匱則留之不要留鉟銷如前不折分兩九炒芽方右將硝石焰硝白礬食鹽四味各二錢研末用之將砂銚一枚取黃芽先投銚內次用前四藥覆黃芽座銚子上更於銚子下熳火逼炒恐銚藥沸涌挼皂角水灑之莫令涌出候藥不涌用建盞覆定更用濕紙封盞縫聽銚內聲絶去盞去前四味藥汁只取黃芽沐浴轉成紅粉十沐浴方紫袍金帶色鮮鮮合口須教莫妄傳更得杜防相輔助和砂一處水中煎紫非川烏鉟世寶則用不鉟不用白芨白斂杜仲防己川椒合口者已上七味各二錢右銼如麻豆大取長流水投藥於銚內將黃芽用新布包裏懸胎須坐於鐵三腳上煮一時如水耗則頻添之火足取出去布焙乾轉紅粉大丹如要鉟成世寶則將黃芽鉟之到此可戒可慎禁戒甚嚴也十一轉紅粉法將前黃芽研細投砂合內如前用醋調蚌粉封合子口縫座砂合於鐵三腳架上上入爐養之到此不用水鼎也用卯酉火各四兩養一百二十日去火取出合子開看皆成紅粉將粉研為細末用一淨盆盛水八九分滿傾出紅粉於盆中水上輕清浮者用紙綽之日乾乃曰紅粉留之轉為明窗塵大丹沉在水底者白砂子鉟之成銀其銀留之向後打造混沌用十二轉明窗塵法將水面所綽紅粉投於砂合內實捺合定以醋調蚌粉封合子口縫座於鐵三腳架子上用熟火四兩卯酉抽换養之一百二十日成明窗塵火日數足去火出爐取合開看其紅粉輕清如明窗塵謂如窗隙中之飛塵至細也將明窗塵養丹砂轉大丹十三轉大丹法欲養大丹當於僻靜去處不聞雞犬不見婦人方可為也將明窗塵一半投砂合內用成塊朱砂六兩共一十塊則可若朱砂太大則難栽於明窗塵中也更用明窗塵一半覆之入合合定以醋調赤石脂固合子口縫入爐座鐵三腳子上卯酉頂火各四兩養三百日成大丹取出合子開看取明窗塵盛於淨器中取朱砂轉紫河車所養丹砂六兩除去四兩留轉大丹其二兩逐旋研用人死七日魂魄未散心頭微溫者取丹砂半錢以井花水灌入口其人立蘇如魂魄已散丹砂入口其尸千年不壞如人可服將丹砂研細以楮汁圓如梧子大面北以井花水吞一圓令人百痾不染久而臟腑俱成金色延年却期永無危急之患此丹砂可以扶危濟急丹砂半錢匕可乾汞一斤成銀不可輕用戒之慎之十四轉紫河車法將丹砂四兩研細入雄黃四兩更入生汞二兩同研細狀如桃花粉投於砂合內用醋調赤石脂固縫入爐坐鐵三腳子上卯酉頂火各四兩養六十日足取出開看其藥成紫河車用一剜耳許可乾汞一兩其色轉黃十五轉黃輿法將前紅粉淘下白芽子所鉟銀半斤打造混沌恐銀少於别轉中乾者添用將眀窗塵一半投混沌底將紫河車更研入雌黃四兩同研細投眀窗塵中其上更以眀窗塵覆之醋調赤石脂固混沌口縫外更用大砂合納以白虎石鋪蓋其安混沌於當中亦以醋調赤石脂固口縫入爐坐合子於鐵三腳上卯酉各用頂火四兩養四十九日此黃輿用一剜耳許將汞一兩安建盞內以黃輿糝汞頓慢火上乾成黃金白虎石即白堊也十六轉紫金粉法將黃輿點汞成金一十六兩造一混沌將黃輿一十六兩或一十兩其餘留以濟世救貧拔苦研細投於金混沌中醋調赤石脂固混沌口縫用砂合投白虎石一半坐混沌當中更用白虎石蓋滿亦以醋調赤石脂固砂合口縫入爐卯酉各火四兩養四十九日火足取混沌開看已成紫金粉此粉點五金俱成紫金到此切戒輕舉妄用轉大丹法前事俱備選名山擇福地以藏風聚氣去處更要周回三百步無伏尸故氣用古劍一口古鏡一面建壇三層高三尺六寸其壇方圓一丈上以屋蓋壇下當中埋辰砂二十四兩鎮壇壇上有竈竈中安鼎鼎中安神室預先告盟三界十方自古得道真仙當境祀典神祇當山山神土地禱以鍊丹之日毋令陰鬼竊丹之氣用前金混沌更添金一十六兩共前三十二兩只如前者大而如法厚打造投紫金粉於混沌中用醋調赤石脂封固入大砂合此砂合須别燒先以白虎石一半鋪砂合方安混沌更以白虎石覆滿合定亦用醋調赤石脂封固入爐坐於鐵三腳子上卯酉各頂火四兩養十箇月足開爐出砂合取混沌開看藥生成五品隨人功行所結也一法以冬至日下手來年冬至日取第一品名曰龍虎大還丹其丹結於混沌頂如紫金有內丹人服之點化骨肉同飛而成天仙無內丹人服之則成地仙第二品名曰神符白雪丹結於混沌四畔色如美玉服之如上第三品名曰金液小還丹其丹結於混沌四畔如紫金有內丹人服之點化飛仙無內丹人服之長生不死第四品名曰紫遊丹其丹結於丹鼎四畔紫色有內丹人服之可仙無內丹人服之久視長年第五品名曰紫金丹其丹只在混沌底成紫金色有內丹人服之可仙無內丹人服之久視長年修鍊畢看丹砂結成如何品數此隨人功行而成將丹藥看多少研細以楮汁搜和丸如桐子大四十九粒餘丹化瓦礫皆成至寶可留濟世救貧拔苦不可為贍家及妄用上帝有戒宜深慎之其丹四十九粒用絳紗縫夾袋貯於前金混沌中投於丹井內四十九日日夜不可暫離丹井至誠看守候日足取絳紗袋上丹井開袋先取二十五粒投於名山大川淵源潭洞以謝三界十方上聖自古得道真仙並自己符法籙中靈官將吏並當境典祀神祇山神土地畢次於清晨面北以丹井中水吞一粒服畢候有功行則玉符宣召白日飛升可與骨肉為善此丹非人間所有宜祕藏之感氣十六轉金丹
